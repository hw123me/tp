<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم - إدارة الشواهد</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">

  </head>
  <body>
    <nav class="navbar navbar-dark custom-navbar mb-4 shadow-sm py-2 py-md-3" style="background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); border-bottom: 3px solid #ffc107;">
    <div class="container d-flex justify-content-between align-items-center">
        
        <div class="d-flex align-items-center gap-2 gap-md-3 order-1">
            <div class="bg-white text-primary rounded-circle d-flex align-items-center justify-content-center shadow-sm border border-2 border-white"
                 style="width: 40px; height: 40px; min-width: 40px;">
                <i class="bi bi-collection-fill fs-5 fs-md-4"></i>
            </div>
            <div class="text-white">
                <h6 class="fw-bold mb-0" style="font-size: 0.9rem; @media (min-width: 768px) { font-size: 1.1rem; }">إدارة الشواهد</h6>
                <div class="d-none d-md-block" style="font-size: 0.75rem; opacity: 0.85;">
                    مجمع الإمام يعقوب وأبو عمرو البصري
                </div>
            </div>
        </div>

        <div class="d-flex align-items-center order-2">
            <div id="userInfoContainer" class="d-flex align-items-center bg-white bg-opacity-10 rounded-pill px-2 py-1 border border-white border-opacity-25" style="min-width: fit-content;">
                
                <div class="text-white d-flex flex-column text-end cursor-pointer px-2" onclick="openEditProfile()" style="min-width: 50px;">
                    <span class="d-none d-sm-block opacity-75" style="font-size: 0.6rem; line-height: 1;">مرحباً بك</span>
                    <span id="userInfo" class="fw-bold text-nowrap" style="font-size: 0.75rem; line-height: 1.2;"></span>
                </div>

                <button onclick="handleLogout()" class="btn btn-sm btn-light rounded-circle shadow-sm text-danger d-flex align-items-center justify-content-center" 
                        style="width: 30px; height: 30px; min-width: 30px;">
                    <i class="bi bi-power"></i>
                </button>
            </div>
        </div>

    </div>
</nav>

    <div id="mainDashboard" class="container py-4">
     <div id="progressSection" class="mx-auto mb-4 p-4 shadow-lg rounded-4 hidden" 
     style="max-width: 900px; background: #ffffff; border-top: 4px solid #1e3c72; position: relative;">
    
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center">
            <div class="bg-primary bg-opacity-10 p-3 rounded-circle me-3">
                <i class="bi bi-speedometer2 text-primary fs-4"></i>
            </div>
            <div>
                <h6 class="fw-bold text-dark mb-0">تقرير الإنجاز العام</h6>
                <small id="progressStatus" class="badge bg-light text-primary border"></small>
            </div>
        </div>
        <div class="text-end">
             <span id="progressPercent" class="h2 fw-black text-primary mb-0">0%</span>
        </div>
    </div>

    <div class="progress" style="height: 10px; border-radius: 20px; background-color: #f0f2f5;">
        <div id="progressBar" 
             class="progress-bar progress-bar-striped progress-bar-animated shadow-sm" 
             role="progressbar" 
             style="width: 0%; border-radius: 20px; background: linear-gradient(90deg, #1e3c72, #2a5298);">
        </div>
    </div>
</div>

      <div
        id="evidenceContainer"
        class="mx-auto shadow-sm rounded-4 bg-white overflow-hidden"
        style="max-width: 900px; min-height: 200px"
      >
        <div class="text-center py-5">
          <div
            class="spinner-grow text-primary"
            role="status"
            style="width: 3rem; height: 3rem"
          >
            <span class="visually-hidden">Loading...</span>
          </div>
          <h6 class="mt-3 text-primary fw-bold">
            جاري مزامنة الملفات والشواهد...
          </h6>
        </div>
      </div>
    </div>
   <div class="modal fade" id="editProfileModal" tabindex="-1" aria-hidden="true" dir="rtl">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold text-dark">إعدادات الحساب</h5>
                <button type="button" class="btn-close ms-0 me-auto" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="text-center mb-4">
                    <div class="bg-light d-inline-block p-3 rounded-circle mb-2">
                        <i class="bi bi-person-gear text-primary fs-1"></i>
                    </div>
                </div>
                <form id="editProfileForm" class="px-2">
                    <div class="form-floating mb-3">
                        <input type="text" id="editEmail" class="form-control border-0 bg-light" readonly>
                        <label for="editEmail">البريد الإلكتروني</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" id="editFullName" class="form-control" placeholder="الاسم" required>
                        <label for="editFullName">الاسم الكامل</label>
                    </div>
                    <div class="form-floating mb-2">
                        <input type="password" id="editPassword" class="form-control" placeholder="كلمة المرور">
                        <label for="editPassword">كلمة المرور الجديدة (اختياري)</label>
                    </div>
                    <div id="editStatus" class="small mt-2"></div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">إلغاء</button>
                <button type="button" class="btn btn-primary rounded-pill px-4 shadow" onclick="saveProfileChanges()" id="saveProfileBtn">حفظ التغييرات</button>
            </div>
        </div>
    </div>
</div>
    <footer
      class="custom-footer text-white mt-auto py-3"
      style="background: #1e3c72"
    >
      <div class="container text-center">
        <div class="row align-items-center">
          <div class="col-md-4 text-md-start mb-3 mb-md-0 opacity-75">
            <small>جميع الحقوق محفوظة &copy; 2026</small>
          </div>
          <div class="col-md-8 text-md-end">
            <div
              class="d-flex flex-column flex-md-row justify-content-md-end gap-3 small"
            >
              <span
                ><i class="bi bi-lightbulb-fill text-warning me-1"></i>فكرة:
                <b>خالد المالكي</b></span
              >
              <span
                ><i class="bi bi-code-slash text-info me-1"></i>تطوير:
                <b>عبدالرزاق المعلوي</b></span
              >
            </div>
          </div>
        </div>
      </div>
    </footer>

    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbwnDWhOi8f6E_3loRb9cwfk2kczplaeSFUau18eg42o6pCXPNR_fMYdo_EtqVcy1wNc/exec";
      const role = localStorage.getItem("userRole");
      const userID = localStorage.getItem("userEmail");

      function displayUserInfo() {
        const userName = localStorage.getItem("userName");
        const userRole = localStorage.getItem("userRole");
        if (userName && userRole) {
          const container = document.getElementById("userInfoContainer");
          document.getElementById("userInfo").textContent =
            `${userName} (${userRole})`;
          container.classList.remove("hidden");
        }
      }

      async function loadEvidence() {
        const container = document.getElementById("evidenceContainer");
        const progressSection = document.getElementById("progressSection");
        const progressBar = document.getElementById("progressBar");
        const progressPercent = document.getElementById("progressPercent");
        const progressStatus = document.getElementById("progressStatus");

        // تنظيف الحاوية وإظهار مؤشر التحميل
        container.innerHTML = `<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>`;

        try {
          const [evRes, subRes] = await Promise.all([
            fetch(SCRIPT_URL, {
              method: "POST",
              body: JSON.stringify({
                action: "getEvidence",
                role: role.trim(),
              }),
            }),
            fetch(SCRIPT_URL, {
              method: "POST",
              body: JSON.stringify({ action: "getAllSubmissions" }),
            }),
          ]);

          const evidenceList = await evRes.json();
          const allSubmissions = await subRes.json();
          const mySubmissions = allSubmissions.filter(
            (s) => s.username === userID,
          );

          const totalEvidence = evidenceList.length;
          const completedEvidence = evidenceList.filter((item) =>
            mySubmissions.some((s) => s.category.trim() === item.title.trim()),
          ).length;
          const percentage =
            totalEvidence > 0
              ? Math.round((completedEvidence / totalEvidence) * 100)
              : 0;

          // تحديث شريط التقدم
          progressSection.classList.remove("hidden");
          progressBar.style.width = `${percentage}%`;
          progressPercent.textContent = `${percentage}%`;
          progressStatus.textContent = `تم إكمال ${completedEvidence} من أصل ${totalEvidence} متطلبات`;
          progressBar.className = `progress-bar progress-bar-striped progress-bar-animated ${percentage < 50 ? "bg-danger" : percentage < 100 ? "bg-warning" : "bg-success"}`;

          // إزالة تنسيقات الحاوية القديمة لجعل العناصر تبدو منفصلة
          container.style.backgroundColor = "transparent";
          container.style.boxShadow = "none";

          let accordionHtml = `<div class="accordion" id="mainEvidenceAccordion" dir="rtl">`;

          evidenceList.forEach((item, index) => {
            const mainCollapseId = `main-collapse-${index}`;
            const relatedFiles = mySubmissions.filter(
              (s) => s.category.trim() === item.title.trim(),
            );
            const isDone = relatedFiles.length > 0;

            // تحديد لون الخلفية بناءً على الحالة
            // مكتمل: خلفية خضراء فاتحة جدًا | معلق: خلفية زرقاء/رمادية فاتحة
            const headerBgColor = isDone ? "#f0fff4" : "#f8f9fa";
            const borderColor = isDone ? "#c6f6d5" : "#edf2f7";

            const filesHtml = isDone
              ? `<div class="row g-2">${relatedFiles
                  .map(
                    (file) => `
                    <div class="col-sm-6 col-md-4">
                        <div class="d-flex align-items-center bg-white border rounded-3 p-2 shadow-sm">
                            <a href="${file.fileName}" target="_blank" class="text-decoration-none text-dark d-flex align-items-center overflow-hidden flex-grow-1">
                                <i class="bi bi-file-earmark-check-fill text-success fs-5 ms-2"></i>
                                <span class="small fw-bold text-truncate">مرفق ${file.date.split("T")[0]}</span>
                            </a>
                            <button onclick="deleteFile('${file.fileId}', this)" class="btn btn-link text-danger p-0 ms-2"><i class="bi bi-trash3-fill"></i></button>
                        </div>
                    </div>`,
                  )
                  .join("")}</div>`
              : `<div class="text-center p-3 text-muted small bg-white rounded-3 border-dashed">لا توجد ملفات مرفوعة حالياً</div>`;

            accordionHtml += `
            <div class="accordion-item mb-4 rounded-4 shadow-sm border-0 overflow-hidden" style="border: 1px solid ${borderColor} !important;">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed py-3 text-end" type="button" 
                            data-bs-toggle="collapse" data-bs-target="#${mainCollapseId}" 
                            style="background-color: ${headerBgColor};">
                        <div class="d-flex align-items-center w-100 justify-content-between pe-3">
                            <div class="d-flex align-items-center">
                                <span class="badge ${isDone ? "bg-success" : "bg-primary"} rounded-pill ms-3 shadow-sm">${index + 1}</span>
                                <div class="fw-bold text-dark fs-6">
                                    <i class="bi ${isDone ? "bi-check-all text-success" : "bi-hourglass-split text-primary"} me-2"></i>
                                    ${item.title}
                                </div>
                            </div>
                            <span class="badge ${isDone ? "bg-success text-white" : "bg-secondary-subtle text-muted"} rounded-pill px-3 py-2">
                                ${isDone ? "مكتمل ✅" : "قيد الانتظار"}
                            </span>
                        </div>
                    </button>
                </h2>
                <div id="${mainCollapseId}" class="accordion-collapse collapse" data-bs-parent="#mainEvidenceAccordion">
                    <div class="accordion-body bg-white px-4 py-4 text-end">
                        <div class="description-box mb-3 p-3 rounded-3 border-start border-4 border-primary bg-light">
                            <h6 class="fw-bold small text-primary mb-1"><i class="bi bi-info-circle me-1"></i> وصف المتطلب:</h6>
                            <p class="text-muted small m-0 lh-base">${item.description}</p>
                        </div>
                        <div class="files-section mt-4">
                            <h6 class="small fw-bold text-secondary mb-3">الملفات المرفوعة:</h6>
                            <div id="file-list-${index}">${filesHtml}</div>
                        </div>
                        <div class="mt-4 pt-3 border-top">
                            <div id="status-${index}"></div>
                            <div id="display-${index}" class="small mb-2 fw-bold text-primary"></div>
                            <input type="file" id="input-${index}" class="d-none" onchange="handleInlineUpload(${index}, '${item.title.replace(/'/g, "\\'")}')">
                            <button id="btn-${index}" class="btn ${isDone ? "btn-outline-success" : "btn-primary"} btn-sm w-100 rounded-3 fw-bold py-2 shadow-sm" onclick="document.getElementById('input-${index}').click()">
                                <i class="bi bi-cloud-arrow-up-fill ms-2"></i> 
                                ${isDone ? "إضافة مرفق إضافي" : "رفع الشاهد الآن"}
                            </button>
                        </div>
                    </div>
                </div>
            </div>`;
          });

          container.innerHTML = accordionHtml + `</div>`;
        } catch (error) {
          container.innerHTML = `<div class="alert alert-danger m-3 text-center">حدث خطأ أثناء تحميل البيانات. يرجى التحديث.</div>`;
          console.error(error);
        }
      }
      async function handleInlineUpload(index, category) {
        const fileInput = document.getElementById(`input-${index}`);
        const status = document.getElementById(`status-${index}`);
        const btn = document.getElementById(`btn-${index}`);
        const display = document.getElementById(`display-${index}`);

        if (fileInput.files.length === 0) return;

        const file = fileInput.files[0];
        display.innerText = "📄 " + file.name;
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm ms-2"></span> جاري الرفع...`;

        const reader = new FileReader();
        reader.onload = async function (e) {
          const base64Data = e.target.result.split(",")[1];
          try {
            const response = await fetch(SCRIPT_URL, {
              method: "POST",
              body: JSON.stringify({
                action: "uploadFile",
                username: userID,
                category: category,
                fileName: file.name,
                mimeType: file.type,
                base64Data: base64Data,
              }),
            });
            const result = await response.json();
            if (result.status === "success") {
              status.innerHTML =
                "<div class='alert alert-success py-2 small'>✅ تم الرفع بنجاح!</div>";
              setTimeout(() => loadEvidence(), 1500);
            } else {
              status.innerHTML = `<div class='alert alert-danger py-2 small'>❌ ${result.message}</div>`;
              btn.disabled = false;
              btn.innerHTML = "إعادة المحاولة";
            }
          } catch (error) {
            status.innerHTML =
              "<div class='alert alert-danger py-2 small'>❌ فشل الاتصال</div>";
            btn.disabled = false;
          }
        };
        reader.readAsDataURL(file);
      }

      async function deleteFile(fileId, btnElement) {
        const result = await Swal.fire({
            title: 'تأكيد الحذف',
            text: 'هل تريد حذف هذا الملف حقاً؟',
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'نعم، احذف',
            cancelButtonText: 'إلغاء',
            confirmButtonColor: '#d33',
            cancelButtonColor: '#6c757d',
        });

    // هذا هو السطر البديل لـ "if (!confirm) return"
    if (!result.isConfirmed) return;
        
        btnElement.disabled = true;
        btnElement.innerHTML = `<span class="spinner-border spinner-border-sm"></span>`;

        try {
          const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
              action: "deleteFile",
              fileId: fileId,
              username: userID,
            }),
          });
          const result = await response.json();
          if (result.status === "success") loadEvidence();
          else alert("فشل الحذف");
        } catch (e) {
          alert("خطأ في الاتصال");
          btnElement.disabled = false;
        }
      }

      function handleLogout() {
        localStorage.clear();
        window.location.href = "index.html";
      }
      // فتح نافذة التعديل وتعبئة البيانات الحالية
      function openEditProfile() {
        const userName = localStorage.getItem("userName");
        const userEmail = localStorage.getItem("userEmail"); // userID

        document.getElementById("editEmail").value = userEmail;
        document.getElementById("editFullName").value = userName;
        document.getElementById("editPassword").value = ""; // يبقى فارغاً للأمان
        document.getElementById("editStatus").innerHTML = "";

        const modal = new bootstrap.Modal(
          document.getElementById("editProfileModal"),
        );
        modal.show();
      }

      // إرسال التحديثات إلى Google Apps Script
      async function saveProfileChanges() {
        const fullName = document.getElementById("editFullName").value;
        const password = document.getElementById("editPassword").value;
        const email = document.getElementById("editEmail").value;
        const btn = document.getElementById("saveProfileBtn");
        const status = document.getElementById("editStatus");

        if (!fullName) {
          status.innerHTML =
            "<div class='alert alert-warning py-1 small'>يرجى إدخال الاسم</div>";
          return;
        }

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> جاري الحفظ...`;

        try {
          const response = await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({
              action: "updateProfile",
              email: email,
              fullName: fullName,
              password: password, // سيتم تحديثها فقط إذا لم تكن فارغة في السيرفر
            }),
          });

          const result = await response.json();

          if (result.status === "success") {
            // تحديث البيانات في التخزين المحلي للمتصفح
            localStorage.setItem("userName", fullName);

            status.innerHTML =
              "<div class='alert alert-success py-1 small'>✅ تم تحديث البيانات بنجاح</div>";

            // تحديث واجهة المستخدم فوراً
            displayUserInfo();

            setTimeout(() => {
              bootstrap.Modal.getInstance(
                document.getElementById("editProfileModal"),
              ).hide();
              btn.disabled = false;
              btn.innerHTML = "حفظ التغييرات";
            }, 1500);
          } else {
            status.innerHTML = `<div class='alert alert-danger py-1 small'>❌ ${result.message}</div>`;
            btn.disabled = false;
            btn.innerHTML = "حفظ التغييرات";
          }
        } catch (error) {
          status.innerHTML =
            "<div class='alert alert-danger py-1 small'>❌ حدث خطأ في الاتصال</div>";
          btn.disabled = false;
          btn.innerHTML = "حفظ التغييرات";
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        displayUserInfo();
        loadEvidence();
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
