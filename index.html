<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدخول | إدارة الشواهد</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .auth-card {
            border: none;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .nav-tabs {
            border: none;
            background: #f1f3f5;
            border-radius: 12px;
            padding: 5px;
        }

        .nav-tabs .nav-link {
            border: none !important;
            border-radius: 10px !important;
            color: #6c757d;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-tabs .nav-link.active {
            background-color: #0d6efd !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2);
        }

        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #dee2e6;
            background-color: #fdfdfd;
        }

        .input-group-text {
            border-radius: 10px;
            background: transparent;
            cursor: pointer;
        }

        .btn-auth {
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center py-5">
    <div class="card auth-card shadow-lg" style="width: 100%; max-width: 450px;">
        <div class="card-body p-4 p-md-5">
            
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                    <i class="bi bi-shield-lock-fill text-primary fs-1"></i>
                </div>
                <h4 class="fw-bold text-dark"> إدارة الشواهد التعليمية</h4>
                <p class="text-muted small">مجمع الإمام يعقوب وأبو عمرو البصري</p>
            </div>

            <ul class="nav nav-tabs mb-4" id="authTabs" role="tablist">
                <li class="nav-item w-50 text-center" role="presentation">
                    <button class="nav-link active w-100" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">دخول</button>
                </li>
                <li class="nav-item w-50 text-center" role="presentation">
                    <button class="nav-link w-100" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">حساب جديد</button>
                </li>
            </ul>

            <div class="tab-content" id="authTabContent">
                <div class="tab-pane fade show active" id="login" role="tabpanel">
                    <form id="loginForm" onsubmit="event.preventDefault(); login();">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">البريد الإلكتروني</label>
                            <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">كلمة المرور</label>
                            <div class="input-group">
                                <input type="password" class="form-control border-end-0" id="loginPassword" required>
                                <span class="input-group-text bg-light border-start-0" onclick="togglePass('loginPassword')">
                                    <i class="bi bi-eye" id="loginPasswordIcon"></i>
                                </span>
                            </div>
                        </div>
                        <button type="submit" id="loginBtn" class="btn btn-primary btn-auth w-100 shadow-sm" >
                            دخول للنظام
                        </button>
                        <div class="text-center">
                            <a href="#" onclick="forgotPassword()" class="text-decoration-none small text-royal-green">نسيت كلمة المرور؟</a>
                        </div>

                        <div id="errorMsg" class="text-danger mt-3 text-center small"></div>
                                </form>
                        </div>

                <div class="tab-pane fade" id="register" role="tabpanel">
                    <form id="registerForm" onsubmit="event.preventDefault(); register();">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">الاسم الكامل</label>
                            <input type="text" class="form-control" id="registerName" placeholder="اكتب اسمك الثلاثي" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">البريد الإلكتروني</label>
                            <input type="email" class="form-control" id="registerEmail" placeholder="name@school.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">الدور الوظيفي</label>
                            <select class="form-select" id="registerRole" required>
                                <option value="معلم" selected>معلم</option>
                                <option value="وكيل">وكيل</option>
                                <option value="موجه طلابي">موجه طلابي</option>
                                <option value="رائد نشاط">رائد نشاط</option>
                                <option value="محضر مختبر">محضر مختبر</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">كلمة المرور</label>
                            <input type="password" class="form-control" id="registerPassword" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">تأكيد كلمة المرور</label>
                            <input type="password" class="form-control" id="registerConfirmPassword" required>
                        </div>
                        <button type="submit" id="registerBtn" class="btn btn-primary btn-auth w-100 shadow-sm">
                            إنشاء الحساب
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwnDWhOi8f6E_3loRb9cwfk2kczplaeSFUau18eg42o6pCXPNR_fMYdo_EtqVcy1wNc/exec";

    // دالة إظهار وإخفاء كلمة المرور
    function togglePass(id) {
        const input = document.getElementById(id);
        const icon = document.getElementById(id + 'Icon');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }

    async function register() {
        const name = document.getElementById("registerName").value.trim();
        const email = document.getElementById("registerEmail").value.trim();
        const pass = document.getElementById("registerPassword").value;
        const confirmPass = document.getElementById("registerConfirmPassword").value;
        const role = document.getElementById("registerRole").value;

        if (!name || !email || !pass) {
            Swal.fire('تنبيه', 'يرجى تعبئة كافة الحقول', 'warning');
            return;
        }

        if (pass !== confirmPass) {
            Swal.fire('خطأ', 'كلمة المرور وتأكيدها غير متطابقين', 'error');
            return;
        }

        const btn = document.getElementById("registerBtn");
        const originalText = btn.innerHTML;
        setLoading(btn, true);

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "register", fullname: name, email, role, password: pass })
            });
            const result = await response.json();

            if (result === "exists") {
                Swal.fire('تنبيه', 'البريد الإلكتروني مسجل مسبقاً', 'info');
            } else if (result === "success") {
                Swal.fire('نجاح', 'تم إنشاء الحساب! يمكنك الآن الدخول', 'success');
                document.getElementById('login-tab').click();
                document.getElementById('registerForm').reset();
            }
        } catch (e) {
            Swal.fire('خطأ', 'فشل الاتصال بالسيرفر', 'error');
        } finally {
            setLoading(btn, false, originalText);
        }
    }

    async function login() {
        const email = document.getElementById("loginEmail").value.trim();
        const pass = document.getElementById("loginPassword").value;
        const btn = document.getElementById("loginBtn");

        if (!email || !pass) {
            Swal.fire('تنبيه', 'أدخل بيانات الدخول', 'warning');
            return;
        }

        const originalText = btn.innerHTML;
        setLoading(btn, true);

        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "login", useremail: email, password: pass })
            });
            const result = await response.json();

            if (result.status === "success") {
                localStorage.setItem("userName", result.fullname);
                localStorage.setItem("userRole", result.role);
                localStorage.setItem("userEmail", email);
                window.location.href = (result.role.trim() === "مدير") ? "admin.html" : "dashboard.html";
            } else {
                Swal.fire('فشل الدخول', 'البريد أو كلمة المرور غير صحيحة', 'error');
            }
        } catch (e) {
            Swal.fire('خطأ', 'تحقق من اتصال الإنترنت', 'error');
        } finally {
            setLoading(btn, false, originalText);
        }
    }

    function setLoading(btn, isLoading, originalText) {
        if (isLoading) {
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> جاري التحقق...';
        } else {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }
  async function forgotPassword() {
    const email = document.getElementById('loginEmail').value;
    const errorMsg = document.getElementById('errorMsg');
    

    if (!email) {
        errorMsg.innerText = "يرجى كتابة البريد الإلكتروني أولاً.";
        return;
    }

    errorMsg.innerText = "جاري معالجة طلبك الملكي...";

    try {
        const response = await fetch(`${SCRIPT_URL}?action=recoverPassword&email=${encodeURIComponent(email)}`, {
            method: 'GET',
            redirect: 'follow' // يخبر المتصفح أن يتبع روابط جوجل المعاد توجيهها
        });

        // إذا نجح الاتصال
        const data = await response.json();
        
        if (data.status === "success") {
            errorMsg.innerText = "تم إرسال كلمة المرور بنجاح، تفقد بريدك.";
            errorMsg.className = "text-success mt-3 text-center small";
        } else {
            errorMsg.innerText = "البريد غير مسجل أو حدث خطأ في النظام.";
            errorMsg.className = "text-danger mt-3 text-center small";
        }
    } catch (error) {
        console.error("Fetch Error Details:", error);
        // رسالة تنبيه ذكية
        errorMsg.innerText = "فشل الاتصال بالخادم. تأكد من تحديث نسخة السكربت (Deployment) إلى Anyone.";
        errorMsg.className = "text-danger mt-3 text-center small";
    }
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
